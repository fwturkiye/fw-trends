CATEGORIES = {
    'fitness':   ['spor salonu', 'fitness', 'gym'],
    'wellness':  ['yoga', 'pilates', 'meditasyon'],
    'rising':    ['hyrox', 'padel'],
    'antrenor':  ['personal trainer', 'online fitness kocu', 'fitness egitmeni'],
